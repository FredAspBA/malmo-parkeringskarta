<title>Malmö – parkeringszoner och taxor</title>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" />
<style>
  html, body { height: 100%; margin: 0; font-family: -apple-system, Segoe UI, Roboto, Arial, sans-serif; }
  #map { position: absolute; top: 0; bottom: 0; left: 0; right: 0; }

  .panel {
    background: #fff;
    padding: 12px 14px;
    border-radius: 8px;
    box-shadow: 0 1px 6px rgba(0,0,0,.35);
    font-size: 13px;
    line-height: 1.4;
    color: #222;
  }
  .panel h1 { font-size: 15px; margin: 0 0 8px; }
  .panel table { border-collapse: collapse; }
  .panel td { padding: 2px 6px 2px 0; vertical-align: middle; }
  .swatch { width: 14px; height: 14px; border-radius: 3px; display: inline-block; border: 1px solid rgba(0,0,0,.25); }
  .taxa-name { font-weight: 600; white-space: nowrap; }
  .price { white-space: nowrap; color: #333; }
  .legend-note { margin-top: 8px; font-size: 11px; color: #666; max-width: 230px; }

  .popup-title { font-weight: 700; margin-bottom: 4px; }
  .popup-price { margin-bottom: 2px; }
  .popup-source { font-size: 11px; color: #777; margin-top: 6px; }

  .loading-badge {
    position: absolute; top: 10px; left: 50%; transform: translateX(-50%);
    background: #222; color: #fff; padding: 4px 10px; border-radius: 20px;
    font-size: 12px; z-index: 1000; opacity: 0.85; pointer-events: none;
  }
</style>

<div id="map"></div>

<script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
<script>
// ---- Officiella taxor, källa: malmo.se/Bo-och-leva/Stadsmiljo-och-trafik/Parkering/Parkeringsavgifter.html ----
const TAXA = [
  { code: "A", label: "Taxa A", color: "#2323f8", price: "30 kr/tim 8–22, övrig tid 5 kr/tim", match: "taxa a" },
  { code: "B", label: "Taxa B", color: "#f82323", price: "25 kr/tim 8–22, övrig tid 5 kr/tim", match: "taxa b" },
  { code: "C", label: "Taxa C", color: "#6e6e6e", price: "20 kr/tim 8–22, övrig tid 5 kr/tim", match: "taxa c" },
  { code: "D", label: "Taxa D", color: "#4ea84e", price: "15 kr/tim 8–20, övrig tid 2 kr/tim", match: "taxa d" },
  { code: "E", label: "Taxa E", color: "#e27acf", price: "10 kr/tim 8–20, övrig tid 2 kr/tim", match: "taxa e" },
  { code: "F", label: "Taxa F", color: "#f66708", price: "5 kr/tim 8–20, övrig tid 2 kr/tim", match: "taxa f" },
  { code: "P", label: "Taxa Pendlar", color: "#7e390b", price: "1 kr/tim, alla tider", match: "pendlar" },
];

const WMS_BASE = "https://stadsatlas.malmo.se/wms/fgk.qgs";
const LAYER = "parkeringsavgift_p";

const map = L.map('map', { zoomControl: true }).setView([55.5975, 13.010], 14);

L.tileLayer('https://tile.openstreetmap.org/{z}/{x}/{y}.png', {
  maxZoom: 19,
  attribution: '&copy; <a href="https://www.openstreetmap.org/copyright">OpenStreetMap</a>-bidragsgivare'
}).addTo(map);

const zoneLayer = L.tileLayer.wms(WMS_BASE, {
  layers: LAYER,
  format: 'image/png',
  transparent: true,
  version: '1.3.0',
  opacity: 0.85,
  attribution: 'Parkeringszoner: Malmö stad (stadsatlas.malmo.se)'
}).addTo(map);

// ---- Legend ----
const legend = L.control({ position: 'topright' });
legend.onAdd = function () {
  const div = L.DomUtil.create('div', 'panel');
  let rows = TAXA.map(t => `
    <tr>
      <td><span class="swatch" style="background:${t.color}"></span></td>
      <td class="taxa-name">${t.label}</td>
      <td class="price">${t.price}</td>
    </tr>`).join('');
  div.innerHTML = `
    <h1>Parkeringstaxor i Malmö</h1>
    <table>${rows}</table>
    <div class="legend-note">
      Klicka på en gata i kartan för att se exakt taxa. Zoner hämtas live från Malmö stads officiella karttjänst.
      Boendeparkering ger lägre avgift inom eget område. Vägmärket på plats gäller alltid.
      <br><br>
      <em>Antal parkeringsplatser per zon publiceras inte som öppna data av Malmö stad och visas därför inte här.</em>
    </div>
  `;
  L.DomEvent.disableClickPropagation(div);
  return div;
};
legend.addTo(map);

function taxaFromValue(value) {
  const v = (value || '').toLowerCase();
  return TAXA.find(t => v.includes(t.match));
}

function showLoading(show) {
  let el = document.getElementById('loading-badge');
  if (show) {
    if (!el) {
      el = document.createElement('div');
      el.id = 'loading-badge';
      el.className = 'loading-badge';
      el.textContent = 'Hämtar taxa…';
      document.body.appendChild(el);
    }
  } else if (el) {
    el.remove();
  }
}

map.on('click', async function (e) {
  const size = map.getSize();
  const nw = map.containerPointToLayerPoint([0, 0]);
  const sw = map.project(map.getBounds().getSouthWest());
  const ne = map.project(map.getBounds().getNorthEast());

  // Bounding box of the current view, transformed to EPSG:3857 (meters)
  const sw3857 = L.CRS.EPSG3857.project(map.getBounds().getSouthWest());
  const ne3857 = L.CRS.EPSG3857.project(map.getBounds().getNorthEast());
  const point = e.containerPoint;

  const params = new URLSearchParams({
    SERVICE: 'WMS',
    VERSION: '1.3.0',
    REQUEST: 'GetFeatureInfo',
    LAYERS: LAYER,
    QUERY_LAYERS: LAYER,
    STYLES: '',
    CRS: 'EPSG:3857',
    BBOX: [sw3857.x, sw3857.y, ne3857.x, ne3857.y].join(','),
    WIDTH: Math.round(size.x),
    HEIGHT: Math.round(size.y),
    I: Math.round(point.x),
    J: Math.round(point.y),
    INFO_FORMAT: 'application/json',
    FEATURE_COUNT: 5
  });

  showLoading(true);
  try {
    const res = await fetch(WMS_BASE + '?' + params.toString());
    const json = await res.json();
    showLoading(false);

    if (!json.features || json.features.length === 0) {
      L.popup().setLatLng(e.latlng)
        .setContent('Ingen avgiftszon hittades här (klicka närmare en gata).')
        .openOn(map);
      return;
    }

    const f = json.features[0];
    const value = f.properties.value || '';
    const taxa = taxaFromValue(value);
    const swatch = taxa ? `<span class="swatch" style="background:${taxa.color}"></span> ` : '';

    L.popup().setLatLng(e.latlng).setContent(`
      <div class="popup-title">${swatch}${taxa ? taxa.label : (f.properties.taxa_omrad || 'Okänd taxa')}</div>
      <div class="popup-price">${value}</div>
      <div class="popup-source">Källa: Malmö stad, live data</div>
    `).openOn(map);
  } catch (err) {
    showLoading(false);
    L.popup().setLatLng(e.latlng).setContent('Kunde inte hämta data just nu.').openOn(map);
  }
});
</script>
