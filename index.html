      --panel: #131e1f;
      --ink: #e6efec;
      --ink-muted: #93a8a3;

      --accent-ink: #06262b;

  :root[data-theme="dark"] {
    --paper: #0c1416;
    --panel: #131e1f;
    --ink: #e6efec;
    --ink-muted: #93a8a3;
    --line: #263130;
    --accent: #3fc2d1;

    --accent-ink: #06262b;

    font-weight: 700;

    letter-spacing: .01em;
    margin: 0;
    color: var(--ink);

  }
  .legend-plaque .legend-body { margin-top: 10px; }
  .legend-plaque.is-collapsed .legend-header { justify-content: flex-start; }

    flex: 0 0 auto;

    border: 1px solid var(--line); background: var(--paper); color: var(--ink);
    font-size: 15px; line-height: 1; cursor: pointer;

  .rate-list { display: flex; flex-direction: column; gap: 5px; }
  .rate-row { display: flex; align-items: center; gap: 9px; }
  .rate-chip { width: 9px; height: 18px; border-radius: 2px; flex: 0 0 auto; }
  .rate-name {

  .rate-price {

  .search-pill {

    padding: 8px 18px;
    background: var(--accent); color: var(--accent-ink);

  .facility-badge {
    width: 20px; height: 20px; border-radius: 50%;
    background: var(--facility-bg); color: var(--facility-fg);

  /* Leaflet popup skin */

<script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
<script>
// ---- Officiella taxor, källa: malmo.se/Bo-och-leva/Stadsmiljo-och-trafik/Parkering/Parkeringsavgifter.html ----
const TAXA = [
  { code: "A", label: "Taxa A", color: "#2323f8", price: "30 kr/tim 8–22, övrig tid 5 kr/tim", match: "taxa a", dayRate: 30, offRate: 5, dayStart: 8, dayEnd: 22 },
  { code: "B", label: "Taxa B", color: "#f82323", price: "25 kr/tim 8–22, övrig tid 5 kr/tim", match: "taxa b", dayRate: 25, offRate: 5, dayStart: 8, dayEnd: 22 },
  { code: "C", label: "Taxa C", color: "#6e6e6e", price: "20 kr/tim 8–22, övrig tid 5 kr/tim", match: "taxa c", dayRate: 20, offRate: 5, dayStart: 8, dayEnd: 22 },
  { code: "D", label: "Taxa D", color: "#4ea84e", price: "15 kr/tim 8–20, övrig tid 2 kr/tim", match: "taxa d", dayRate: 15, offRate: 2, dayStart: 8, dayEnd: 20 },
  { code: "E", label: "Taxa E", color: "#e27acf", price: "10 kr/tim 8–20, övrig tid 2 kr/tim", match: "taxa e", dayRate: 10, offRate: 2, dayStart: 8, dayEnd: 20 },
  { code: "F", label: "Taxa F", color: "#f66708", price: "5 kr/tim 8–20, övrig tid 2 kr/tim", match: "taxa f", dayRate: 5, offRate: 2, dayStart: 8, dayEnd: 20 },
  { code: "P", label: "Taxa Pendlar", color: "#7e390b", price: "1 kr/tim, alla tider", match: "pendlar", dayRate: 1, offRate: 1, dayStart: 0, dayEnd: 24 },
];

// Priset just nu för en taxa, baserat på veckodag och klockslag (ignorerar undantag för dag före helgdag).
function currentHourlyRate(taxa) {
  if (taxa.dayStart === 0 && taxa.dayEnd === 24) return taxa.dayRate;
  const now = new Date();
  const isWeekday = now.getDay() >= 1 && now.getDay() <= 5;
  const inDayWindow = now.getHours() >= taxa.dayStart && now.getHours() < taxa.dayEnd;
  return (isWeekday && inDayWindow) ? taxa.dayRate : taxa.offRate;
}

// Plockar ut ett jämförbart kr/tim-pris ur en parkeringsanläggnings fritextrader. Ungefärligt.
function parseHourlyRate(rates) {
  for (const r of rates) {
    const m = r.match(/(\d+(?:[.,]\d+)?)\s*kr\s*\/?\s*(tim|timme|h)\b/i);
    if (m) return parseFloat(m[1].replace(',', '.'));
  }
  if (rates.some(r => /^gratis/i.test(r.trim()))) return 0;
  return null;
}

function formatPrice(p) {
  return p === 0 ? 'Gratis' : p + ' kr/tim';
}

// Destinationspunkt `distanceM` meter i riktning `bearingDeg` från (lat, lon).
function destinationPoint(lat, lon, distanceM, bearingDeg) {
  const R = 6371000;
  const brng = bearingDeg * Math.PI / 180;
  const lat1 = lat * Math.PI / 180, lon1 = lon * Math.PI / 180;
  const lat2 = Math.asin(Math.sin(lat1) * Math.cos(distanceM / R) + Math.cos(lat1) * Math.sin(distanceM / R) * Math.cos(brng));
  const lon2 = lon1 + Math.atan2(Math.sin(brng) * Math.sin(distanceM / R) * Math.cos(lat1), Math.cos(distanceM / R) - Math.sin(lat1) * Math.sin(lat2));
  return { lat: lat2 * 180 / Math.PI, lon: lon2 * 180 / Math.PI };
}

const WMS_BASE = "https://stadsatlas.malmo.se/wms/fgk.qgs";
const LAYER = "parkeringsavgift_p";

// Parkeringsanläggningar (garage/ytor) med eget fast pris, oberoende av gatutaxan.
// Källa: karta.pmalmo.se/api/area (Parkering Malmö). Statisk ögonblicksbild, laddas från facilities.json.
let FACILITIES = [];

const map = L.map('map', { zoomControl: true }).setView([55.5975, 13.010], 14);

L.tileLayer('https://tile.openstreetmap.org/{z}/{x}/{y}.png', {
  maxZoom: 19,
  attribution: '&copy; <a href="https://www.openstreetmap.org/copyright">OpenStreetMap</a>-bidragsgivare'
}).addTo(map);

const zoneLayer = L.tileLayer.wms(WMS_BASE, {
  layers: LAYER,
  format: 'image/png',
  transparent: true,
  version: '1.3.0',
  opacity: 0.85,
  attribution: 'Parkeringszoner: Malmö stad (stadsatlas.malmo.se)'
}).addTo(map);

// ---- Legend ----
const legend = L.control({ position: 'topright' });
legend.onAdd = function () {
  const div = L.DomUtil.create('div', 'plaque legend-plaque');
  let rows = TAXA.map(t => `
    <div class="rate-row">
      <span class="rate-chip" style="background:${t.color}"></span>
      <span class="rate-name">${t.label}</span>
      <span class="rate-price">${t.price}</span>
    </div>`).join('');
  div.innerHTML = `
    <div class="legend-header">
      <div class="legend-title">Parkeringstaxor i Malmö</div>
      <button type="button" class="legend-toggle" id="legend-toggle" aria-label="Minimera taxor" aria-expanded="true">−</button>
    </div>
    <div class="legend-body" id="legend-body">
      <div class="rate-list">${rows}
        <div class="rate-row">
          <span class="legend-facility-chip"><span class="facility-badge" style="width:16px;height:16px;font-size:9px;line-height:12px;">P</span></span>
          <span class="rate-name">P-anläggningar</span>
          <span class="rate-price">Eget fast pris</span>
        </div>
      </div>
      <div class="legend-note">
        Klicka på en gata eller ett P-märke för exakt pris, eller sök en adress till vänster.
        Zoner hämtas live från Malmö stad. Boendeparkering ger lägre avgift inom eget område.
        Vägmärket på plats gäller alltid.
      </div>
    </div>
  `;
  L.DomEvent.disableClickPropagation(div);

  const toggleBtn = div.querySelector('#legend-toggle');
  const body = div.querySelector('#legend-body');
  function setCollapsed(collapsed) {
    div.classList.toggle('is-collapsed', collapsed);
    body.style.display = collapsed ? 'none' : '';
    toggleBtn.textContent = collapsed ? '+' : '−';
    toggleBtn.setAttribute('aria-expanded', String(!collapsed));
    toggleBtn.setAttribute('aria-label', collapsed ? 'Visa taxor' : 'Minimera taxor');
  }
  toggleBtn.addEventListener('click', () => setCollapsed(!div.classList.contains('is-collapsed')));
  // Hopfälld som standard på smala skärmar, så kartan inte skyms på mobilen.
  setCollapsed(window.innerWidth < 640);

  return div;
};
legend.addTo(map);

// ---- Address search ----
const searchControl = L.control({ position: 'topleft' });
searchControl.onAdd = function () {
  const div = L.DomUtil.create('div', 'search-panel');
  div.innerHTML = `
    <form id="search-form" class="search-pill">
      <input id="search-input" type="text" placeholder="Sök adress i Malmö…" autocomplete="off">
      <button type="submit">Sök</button>
    </form>
    <div class="search-status" id="search-status"></div>
  `;
  L.DomEvent.disableClickPropagation(div);
  return div;
};
searchControl.addTo(map);

document.getElementById('search-form').addEventListener('submit', function (ev) {
  ev.preventDefault();
  const q = document.getElementById('search-input').value.trim();
  if (q) geocodeAndShow(q);
});

async function geocodeAndShow(query) {
  const status = document.getElementById('search-status');
  status.textContent = 'Söker…';
  // Sökrutan (lon_min,lat_max,lon_max,lat_min) med marginal runt Malmö.
  const viewbox = '12.80,55.70,13.20,55.45';
  const url = 'https://nominatim.openstreetmap.org/search?format=json&limit=1&countrycodes=se&bounded=1&viewbox=' +
    encodeURIComponent(viewbox) + '&q=' + encodeURIComponent(query + ', Malmö');
  try {
    const res = await fetch(url);
    const results = await res.json();
    if (!results.length) {
      status.textContent = 'Adressen hittades inte.';
      return;
    }
    status.textContent = '';
    const latlng = L.latLng(parseFloat(results[0].lat), parseFloat(results[0].lon));
    map.setView(latlng, 18);
    await showInfoPopup(latlng, results[0].display_name, true);
  } catch (err) {
    status.textContent = 'Kunde inte söka just nu.';
  }
}

function taxaFromValue(value) {
  const v = (value || '').toLowerCase();
  return TAXA.find(t => v.includes(t.match));
}

// ---- Facilities (parkeringsanläggningar med fast pris) ----
const facilityIcon = L.divIcon({
  className: '',
  html: '<div class="facility-badge">P</div>',
  iconSize: [20, 20],
  iconAnchor: [10, 10]
});

fetch('facilities.json')
  .then(res => res.json())
  .then(data => {
    FACILITIES = data;
    FACILITIES.forEach(f => {
      L.marker([f.lat, f.lon], { icon: facilityIcon, title: f.name }).addTo(map).bindPopup(`
        <div class="pop-stripe" style="border-color:var(--facility-fg);">
          <div class="pop-eyebrow"><span class="pop-chip" style="background:var(--facility-fg);color:#1b2422;">P</span>Fast pris</div>
          <div class="pop-heading">${f.name}</div>
          <div class="pop-meta">${f.addr.join(', ')}</div>
          <div class="pop-price">${f.rates.filter(Boolean).map(r => r).join('<br>')}</div>
          <div class="pop-source">Ej gatutaxa – källa: Parkering Malmö</div>
        </div>
      `);
    });
  })
  .catch(() => { /* facilities are a bonus layer; page works fine without them */ });

function haversine(lat1, lon1, lat2, lon2) {
  const R = 6371000;
  const toRad = d => d * Math.PI / 180;
  const dLat = toRad(lat2 - lat1), dLon = toRad(lon2 - lon1);
  const a = Math.sin(dLat / 2) ** 2 + Math.cos(toRad(lat1)) * Math.cos(toRad(lat2)) * Math.sin(dLon / 2) ** 2;
  return R * 2 * Math.atan2(Math.sqrt(a), Math.sqrt(1 - a));
}

function nearbyFacilities(latlng, radiusM, limit) {
  return FACILITIES
    .map(f => ({ ...f, dist: haversine(latlng.lat, latlng.lng, f.lat, f.lon) }))
    .filter(f => f.dist <= radiusM)
    .sort((a, b) => a.dist - b.dist)
    .slice(0, limit || 3);
}

function showLoading(show, text) {
  let el = document.getElementById('loading-badge');
  if (show) {
    if (!el) {
      el = document.createElement('div');
      el.id = 'loading-badge';
      el.className = 'loading-badge';
      document.body.appendChild(el);
    }
    el.innerHTML = '<span class="loading-dot"></span>' + (text || 'Hämtar taxa…');
  } else if (el) {
    el.remove();
  }
}

// Fristående GetFeatureInfo-fråga för en enskild punkt (oberoende av kartans nuvarande vy/zoom).
// Kartservern kräver en tillräckligt stor bildruta för att hitta gator som ligger en bit
// från den exakta adresspunkten (t.ex. husets ingång vs. gatans mittlinje) - en för liten
// bildruta missar träffar även om upplösningen (m/pixel) är oförändrad.
async function fetchTaxaAtPoint(lat, lon) {
  const center = L.CRS.EPSG3857.project(L.latLng(lat, lon));
  const resPerPx = 0.597; // motsvarar zoom 18 i EPSG:3857
  const size = 1280; // px
  const half = resPerPx * size / 2; // ~382 m
  const params = new URLSearchParams({
    SERVICE: 'WMS',
    VERSION: '1.3.0',
    REQUEST: 'GetFeatureInfo',
    LAYERS: LAYER,
    QUERY_LAYERS: LAYER,
    STYLES: '',
    CRS: 'EPSG:3857',
    BBOX: [center.x - half, center.y - half, center.x + half, center.y + half].join(','),
    WIDTH: size,
    HEIGHT: size,
    I: Math.round(size / 2),
    J: Math.round(size / 2),
    INFO_FORMAT: 'application/json',
    FEATURE_COUNT: 5
  });
  const res = await fetch(WMS_BASE + '?' + params.toString());
  const json = await res.json();
  if (!json.features || json.features.length === 0) return null;
  return json.features[0].properties;
}

// Provar gatutaxan i en ring av punkter runt `latlng`, plus fastprisparkeringar, och rankar allt efter pris just nu.
async function findCheapestNearby(latlng) {
  const radii = [100, 220];
  const directions = 8;
  const samplePoints = [{ lat: latlng.lat, lon: latlng.lng, radius: 0 }];
  for (const r of radii) {
    for (let i = 0; i < directions; i++) {
      const bearing = (360 / directions) * i;
      const dp = destinationPoint(latlng.lat, latlng.lng, r, bearing);
      samplePoints.push({ lat: dp.lat, lon: dp.lon, radius: r });
    }
  }

  const streetResults = await Promise.all(samplePoints.map(async p => {
    try {
      const props = await fetchTaxaAtPoint(p.lat, p.lon);
      if (!props) return null;
      const taxa = taxaFromValue(props.value || '');
      if (!taxa) return null;
      return {
        type: 'street', code: taxa.code, label: taxa.label, color: taxa.color,
        badge: taxa.code, distance: p.radius, price: currentHourlyRate(taxa)
      };
    } catch (err) { return null; }
  }));

  const streetByCode = new Map();
  streetResults.filter(Boolean).forEach(c => {
    const existing = streetByCode.get(c.code);
    if (!existing || c.distance < existing.distance) streetByCode.set(c.code, c);
  });

  const facilityCandidates = nearbyFacilities(latlng, 250, 10)
    .map(f => {
      const price = parseHourlyRate(f.rates);
      if (price === null) return null;
      return { type: 'facility', code: 'f:' + f.id, label: f.name, color: 'var(--facility-fg)', badge: 'P', distance: f.dist, price };
    })
    .filter(Boolean);

  const all = [...streetByCode.values(), ...facilityCandidates];
  all.sort((a, b) => a.price - b.price || a.distance - b.distance);
  return all.slice(0, 6);
}

function renderRecommendation(candidates) {
  if (!candidates || !candidates.length) {
    return `<div class="pop-recommend"><div class="eyebrow">Billigast i närheten</div>
      <div class="pop-meta">Inga jämförbara priser hittades inom 250 m.</div></div>`;
  }
  const best = candidates[0];
  const rest = candidates.slice(1, 4);
  const chipStyle = best.type === 'facility' ? `background:${best.color};color:var(--facility-bg)` : `background:${best.color}`;
  const altHtml = rest.length
    ? `<ul class="pop-recommend-alts">` + rest.map(c =>
        `<li>${c.label} — ${formatPrice(c.price)}, ~${Math.round(c.distance)} m</li>`
      ).join('') + `</ul>`
    : '';
  return `
    <div class="pop-recommend">
      <div class="eyebrow">Billigast i närheten just nu</div>
      <div class="pop-recommend-best">
        <span class="pop-chip" style="${chipStyle}">${best.badge}</span>
        <div>
          <div class="pop-heading" style="margin-bottom:1px;">${best.label}</div>
          <div class="pop-price">${formatPrice(best.price)} · ~${Math.round(best.distance)} m bort</div>
        </div>
      </div>
      ${altHtml}
      <div class="pop-meta" style="margin-top:6px;">Ungefärligt jämförelsepris – kontrollera alltid skylt/app innan du parkerar.</div>
    </div>`;
}

async function showInfoPopup(latlng, label, withRecommendation) {
  showLoading(true, withRecommendation ? 'Letar billigaste alternativ…' : 'Hämtar taxa…');

  const [taxaResult, recommendResult] = await Promise.allSettled([
    fetchTaxaAtPoint(latlng.lat, latlng.lng),
    withRecommendation ? findCheapestNearby(latlng) : Promise.resolve(null)
  ]);
  showLoading(false);

  let taxaBlock;
  if (taxaResult.status === 'fulfilled') {
    const props = taxaResult.value;
    if (props) {
      const value = props.value || '';
      const taxa = taxaFromValue(value);
      const stripeColor = taxa ? taxa.color : 'var(--line)';
      const chip = taxa
        ? `<span class="pop-chip" style="background:${taxa.color}">${taxa.code}</span>`
        : '';
      taxaBlock = `
        <div class="pop-stripe" style="border-color:${stripeColor}">
          <div class="pop-eyebrow">${chip}Gatuparkering</div>
          <div class="pop-heading">${taxa ? taxa.label : (props.taxa_omrad || 'Okänd taxa')}</div>
          <div class="pop-price">${value}</div>
        </div>`;
    } else {
      taxaBlock = `
        <div class="pop-stripe">
          <div class="pop-eyebrow">Gatuparkering</div>
          <div class="pop-heading">Ingen gatutaxa här</div>
          <div class="pop-meta">Ingen avgiftszon för gatuparkering hittades exakt på denna punkt.</div>
        </div>`;
    }
  } else {
    taxaBlock = `
      <div class="pop-stripe">
        <div class="pop-eyebrow">Gatuparkering</div>
        <div class="pop-heading">Kunde inte hämta taxa</div>
        <div class="pop-meta">Försök igen om en stund.</div>
      </div>`;
  }

  let recommendationBlock = '';
  let facilitiesBlock = '';
  if (withRecommendation) {
    recommendationBlock = recommendResult.status === 'fulfilled'
      ? renderRecommendation(recommendResult.value)
      : `<div class="pop-recommend"><div class="eyebrow">Billigast i närheten</div><div class="pop-meta">Kunde inte hämta förslag just nu.</div></div>`;
  } else {
    const nearby = nearbyFacilities(latlng, 80, 3);
    if (nearby.length) {
      facilitiesBlock = `<div class="pop-facilities"><div class="eyebrow">P-anläggningar i närheten</div><ul>` +
        nearby.map(f => `<li>${f.name} <span style="color:var(--ink-muted)">(~${Math.round(f.dist)} m)</span>: ${f.rates[0] || ''}</li>`).join('') +
        `</ul></div>`;
    }
  }

  const labelBlock = label ? `<div class="pop-search-label">${label}</div>` : '';

  L.popup({ maxWidth: 300 }).setLatLng(latlng)
    .setContent(labelBlock + taxaBlock + recommendationBlock + facilitiesBlock + '<div class="pop-source">Källa: Malmö stad, live data</div>')
    .openOn(map);
}

map.on('click', function (e) {
  showInfoPopup(e.latlng);
});
</script>
